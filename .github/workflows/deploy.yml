name: Deploy to EC2

on:
  push:
    branches:
      - main

# Cancel any in-progress runs when a new one starts
concurrency:
  group: deploy-to-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 10m
          script: |
            set -e
            echo "🚀 Starting deployment at $(date)"
            
            # Load NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 20 2>/dev/null || nvm install 20
            
            # Navigate to project
            cd ~/lakshmi_mata
            
            # Pull latest code
            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            
            PROJECT_PATH="Buddylynk/Buddylynk"
            
            # Stop PM2
            echo "🛑 Stopping server..."
            pm2 stop buddylynk-server 2>/dev/null || true
            
            # Backend - fast install (skip if node_modules exists and package.json unchanged)
            echo "🔧 Backend dependencies..."
            cd ~/lakshmi_mata/$PROJECT_PATH/server
            npm install --production --prefer-offline --no-audit --no-fund 2>/dev/null || npm install --production
            
            # Frontend - fast install and build
            echo "🎨 Building frontend..."
            cd ~/lakshmi_mata/$PROJECT_PATH/client
            npm install --prefer-offline --no-audit --no-fund 2>/dev/null || npm install
            npm run build
            
            # Start server
            echo "🚀 Starting server..."
            cd ~/lakshmi_mata/$PROJECT_PATH/server
            pm2 start index.js --name buddylynk-server 2>/dev/null || pm2 restart buddylynk-server
            pm2 save
            
            # Restart Nginx
            sudo systemctl restart nginx
            
            echo "✅ Done at $(date)!"
            pm2 status
