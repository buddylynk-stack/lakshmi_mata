name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 300s
          command_timeout: 30m
          envs: AWS_REGION,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,S3_BUCKET_NAME,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,JWT_SECRET
          script: |
            set -e
            echo "Starting deployment"
            
            # Setup Node.js 20 via nvm
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
            nvm install 20
            nvm use 20
            nvm alias default 20
            echo "Node version: $(node -v)"
            echo "NPM version: $(npm -v)"
            
            cd ~/lakshmi_mata
            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            
            echo "Detecting project folder..."
            if [ -d "Buddylynk/Buddylynk" ]; then
              PROJECT_PATH="Buddylynk/Buddylynk"
            elif [ -d "Buddylynk_P2.6/Buddylynk" ]; then
              PROJECT_PATH="Buddylynk_P2.6/Buddylynk"
            else
              echo "Could not find project folder"
              exit 1
            fi
            echo "Found project at $PROJECT_PATH"
            
            echo "Stopping PM2..."
            pm2 stop all || true
            pm2 delete all || true
            
            echo "Installing backend dependencies..."
            cd ~/lakshmi_mata/$PROJECT_PATH/server
            source "$NVM_DIR/nvm.sh" && nvm use 20
            npm install --legacy-peer-deps
            
            echo "Building frontend..."
            cd ~/lakshmi_mata/$PROJECT_PATH/client
            source "$NVM_DIR/nvm.sh" && nvm use 20
            echo "Using Node: $(node -v)"
            rm -rf node_modules package-lock.json
            npm install --legacy-peer-deps
            npm install terser --save-dev
            npm run build
            
            echo "Checking Redis..."
            if ! systemctl is-active --quiet redis-server; then
              sudo systemctl start redis-server
              sudo systemctl enable redis-server
            fi
            
            echo "Setting up environment..."
            cd ~/lakshmi_mata/$PROJECT_PATH/server
            cat > .env << EOF
            AWS_REGION=${AWS_REGION:-us-east-1}
            AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            S3_BUCKET_NAME=${S3_BUCKET_NAME:-buddylynk-media-bucket-2024}
            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
            PORT=5000
            JWT_SECRET=${JWT_SECRET}
            REDIS_HOST=localhost
            REDIS_PORT=6379
            NSFW_API_URL=http://35.227.39.141:8002/nsfw
            ENABLE_NSFW_CHECK=true
            RECOMMENDATION_API_URL=http://35.227.39.141:8001/recommend
            EOF
            
            echo "Starting backend..."
            source "$NVM_DIR/nvm.sh" && nvm use 20
            pm2 start index.js --name buddylynk-server
            pm2 save
            
            chmod -R 755 ~/lakshmi_mata
            
            echo "Restarting Nginx..."
            sudo systemctl restart nginx
            
            echo "Deployment completed!"
            pm2 status
            echo "Zigzag algorithm and ML recommendations active!"
